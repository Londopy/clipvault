name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libx11-dev libxi-dev libxtst-dev \
            libdbus-1-dev pkg-config libssl-dev \
            libxdo-dev libgtk-3-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package ──────────────────────────────────────────────────────────

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "clipvault-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\clipvault.exe" dist\
          Compress-Archive -Path "dist\*" -DestinationPath "$name.zip"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          NAME="clipvault-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir dist
          cp "target/${{ matrix.target }}/release/clipvault" dist/
          tar czf "${NAME}.tar.gz" -C dist .

      # ── Checksums (per-target filename so they don't collide on merge) ───

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          shopt -s nullglob
          shasum -a 256 clipvault-*.zip clipvault-*.tar.gz > "checksums-${{ matrix.target }}.txt"
          cat "checksums-${{ matrix.target }}.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifacts
          path: |
            clipvault-*.zip
            clipvault-*.tar.gz
            checksums-*.txt

  # Both Apple targets in one job so lipo has both binaries for the
  # universal build.
  build-macos:
    name: Build macOS (x86_64 + aarch64 + universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: macos-universal-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin

      - name: Package tarballs
        run: |
          TAG="${{ github.ref_name }}"
          for TARGET in x86_64-apple-darwin aarch64-apple-darwin; do
            mkdir -p "dist-${TARGET}"
            cp "target/${TARGET}/release/clipvault" "dist-${TARGET}/"
            tar czf "clipvault-${TAG}-${TARGET}.tar.gz" -C "dist-${TARGET}" .
          done

      - name: Create universal binary and .dmg
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/clipvault \
            target/aarch64-apple-darwin/release/clipvault \
            -output clipvault-universal
          mkdir -p dmg_tmp/ClipVault.app/Contents/MacOS
          cp clipvault-universal dmg_tmp/ClipVault.app/Contents/MacOS/clipvault
          hdiutil create -volname "ClipVault" -srcfolder dmg_tmp \
            -ov -format UDZO "clipvault-${{ github.ref_name }}-universal-macos.dmg"

      - name: Generate SHA-256 checksums
        run: |
          shasum -a 256 clipvault-*.tar.gz clipvault-*.dmg > checksums-macos.txt
          cat checksums-macos.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            clipvault-*.tar.gz
            clipvault-*.dmg
            checksums-*.txt

  # ── Release ─────────────────────────────────────────────────────────────

  publish:
    name: Publish GitHub Release
    needs: [build, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Merge checksums
        run: |
          cat artifacts/checksums-*.txt > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/clipvault-*.zip
            artifacts/clipvault-*.tar.gz
            artifacts/clipvault-*.dmg
            checksums.txt
