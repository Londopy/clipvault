name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: clipvault.exe
            archive: zip

          - target: x86_64-apple-darwin
            os: macos-latest
            binary: clipvault
            archive: tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            binary: clipvault
            archive: tar.gz

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary: clipvault
            archive: tar.gz

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary: clipvault
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            musl-tools libx11-dev libxi-dev libxtst-dev \
            libdbus-1-dev pkg-config libssl-dev libxdo-dev \
            libgtk-3-dev gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package ──────────────────────────────────────────────────────────────

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag   = "${{ github.ref_name }}"
          $name  = "clipvault-$tag-${{ matrix.target }}"
          New-Item -ItemType Directory -Path dist
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" dist\
          Compress-Archive -Path "dist\*" -DestinationPath "$name.zip"
          # MSI via cargo-wix (optional; requires wix toolset on the runner)
          # cargo wix --target ${{ matrix.target }}

      - name: Package (macOS / Linux)
        if: runner.os != 'Windows'
        run: |
          TAG="${{ github.ref_name }}"
          NAME="clipvault-${TAG}-${{ matrix.target }}"
          mkdir dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          tar czf "${NAME}.tar.gz" -C dist .

      # macOS: create universal binary and .dmg
      - name: Create macOS universal binary
        if: runner.os == 'macOS' && matrix.target == 'aarch64-apple-darwin'
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/clipvault \
            target/aarch64-apple-darwin/release/clipvault \
            -output clipvault-universal
          # hdiutil to package into .dmg
          mkdir -p dmg_tmp/ClipVault.app/Contents/MacOS
          cp clipvault-universal dmg_tmp/ClipVault.app/Contents/MacOS/clipvault
          hdiutil create -volname "ClipVault" -srcfolder dmg_tmp \
            -ov -format UDZO "clipvault-${{ github.ref_name }}-universal-macos.dmg"

      # ── Checksums ────────────────────────────────────────────────────────────

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          shasum -a 256 clipvault-*.{zip,tar.gz,dmg} 2>/dev/null >> checksums.txt || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifacts
          path: |
            clipvault-*.zip
            clipvault-*.tar.gz
            clipvault-*.dmg
            checksums.txt

  # ── Release ──────────────────────────────────────────────────────────────────

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Merge checksums
        run: cat artifacts/checksums.txt >> checksums.txt

      - name: cosign sign artifacts
        uses: sigstore/cosign-installer@v3
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/clipvault-*.zip
            artifacts/clipvault-*.tar.gz
            artifacts/clipvault-*.dmg
            checksums.txt
